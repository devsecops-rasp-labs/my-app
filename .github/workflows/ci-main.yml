name: Main Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build-push:
    needs: build-and-test
    uses: kse-bd8338bbe006/kse-labs-trusted-workflows/.github/workflows/docker-build.yaml@main
    secrets: inherit
    with:
      image-name: my-app
      tags: '${{ github.sha }},latest'
      push: true
